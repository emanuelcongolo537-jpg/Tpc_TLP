<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pauta de Avaliação - Formulário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">3º Trimestre</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="tabela.html">Tabela</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5">
  <h1>Pauta de Avaliação</h1>
  <p>Registo de alunos e classificações</p>

  <!-- FORM -->
  <form id="formAluno" class="card p-4 shadow-sm">
    <h5 class="card-title">➕ Dados do Aluno</h5>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Nome completo</label>
        <input type="text" id="nome" class="form-control" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Idade</label>
        <input type="number" id="idade" class="form-control" min="1" max="99" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Sala</label>
        <input type="text" id="sala" class="form-control" required>
      </div>
      <div class="col-md-2">
        <label class="form-label">Turma</label>
        <input type="text" id="turma" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Nº do Aluno</label>
        <input type="text" id="numero" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Turno</label>
        <input type="text" id="turno" class="form-control" required>
      </div>
    </div>

    <hr>
    <h5 class="card-title">📊 Notas (0 – 20)</h5>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Nota 1</label>
        <input type="number" id="nota1" class="form-control" min="0" max="20" step="0.1" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Nota 2</label>
        <input type="number" id="nota2" class="form-control" min="0" max="20" step="0.1" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Nota 3</label>
        <input type="number" id="nota3" class="form-control" min="0" max="20" step="0.1" required>
      </div>
    </div>

    <div class="mt-3 d-flex gap-2">
      <button type="submit" class="btn btn-primary">Adicionar aluno</button>
      <button type="reset" class="btn btn-secondary">Limpar campos</button>
    </div>
  </form>
</div>

<script>
  let alunos = JSON.parse(localStorage.getItem('alunos')) || [];
  let contador = alunos.length;

  document.getElementById('formAluno').addEventListener('submit', function(e) {
    e.preventDefault();

    const campos = {
      nome:   document.getElementById('nome').value.trim(),
      idade:  document.getElementById('idade').value.trim(),
      sala:   document.getElementById('sala').value.trim(),
      turma:  document.getElementById('turma').value.trim(),
      numero: document.getElementById('numero').value.trim(),
      turno:  document.getElementById('turno').value.trim(),
    };

    const n1 = parseFloat(document.getElementById('nota1').value);
    const n2 = parseFloat(document.getElementById('nota2').value);
    const n3 = parseFloat(document.getElementById('nota3').value);

    if ([n1,n2,n3].some(n => isNaN(n) || n < 0 || n > 20)) {
      alert("Notas inválidas. Insira valores entre 0 e 20.");
      return;
    }

    const media = ((n1 + n2 + n3) / 3);
    contador++;
    const aluno = { id: contador, ...campos, n1, n2, n3, media };

    alunos.push(aluno);
    localStorage.setItem('alunos', JSON.stringify(alunos));

    alert("Aluno adicionado com sucesso!");
    this.reset();
  });
</script>
</body>
</html>
