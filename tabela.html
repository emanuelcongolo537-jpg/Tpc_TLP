<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pauta - Tabela</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar fixa -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">3º Trimestre</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="t1.html">Formulário</a></li>
        <li class="nav-item"><a class="nav-link active" href="tabela.html">Tabela</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5">
  <h1 class="mb-4">📋 Lista de Alunos</h1>
  <div class="table-responsive">
    <table class="table table-striped table-hover shadow">
      <thead class="table-primary">
        <tr>
          <th>ID</th><th>Nome</th><th>Idade</th><th>Sala</th><th>Turma</th>
          <th>Nº Aluno</th><th>Turno</th><th>Nota 1</th><th>Nota 2</th><th>Nota 3</th>
          <th>Média</th><th>Resultado</th><th>–</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  let alunos = JSON.parse(localStorage.getItem('alunos')) || [];

  function renderTabela() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    if (alunos.length === 0) {
      tbody.innerHTML = `<tr><td colspan="13" class="text-center">Nenhum aluno registado ainda.</td></tr>`;
      return;
    }

    alunos.forEach((a, idx) => {
      let resultado = "Não Apto";
      let badgeClass = "danger";
      if (a.media >= 10) { resultado = "Apto"; badgeClass = "success"; }
      else if (a.media >= 8) { resultado = "Recurso"; badgeClass = "warning"; }

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${idx + 1}</td>
        <td>${a.nome}</td>
        <td>${a.idade}</td>
        <td>${a.sala}</td>
        <td>${a.turma}</td>
        <td>${a.numero}</td>
        <td>${a.turno}</td>
        <td>${a.n1.toFixed(1)}</td>
        <td>${a.n2.toFixed(1)}</td>
        <td>${a.n3.toFixed(1)}</td>
        <td class="fw-bold">${a.media.toFixed(2)}</td>
        <td><span class="badge bg-${badgeClass}">${resultado}</span></td>
        <td><button class="btn btn-sm btn-danger" onclick="removerAluno(${a.id})">✕</button></td>
      `;
      tbody.appendChild(tr);
    });
  }

  function removerAluno(id) {
    alunos = alunos.filter(a => a.id !== id);
    localStorage.setItem('alunos', JSON.stringify(alunos));
    renderTabela();
  }

  // Renderizar ao carregar a página
  renderTabela();
</script>
</body>
</html>
